# Brasileirao Serie B 2026.
#
# Source: official REC (Regulamento Especifico da Competicao) published by the
# CBF on 06/02/2026.
#
# Known simplifications:
# - Tiebreak steps 5-6 (fewer red/yellow cards, Art. 12) are skipped -- we
#   have no disciplinary data -- so a tied pair falls straight through to a
#   random draw, the statistically correct stand-in for the official
#   last-resort "sorteio".
name: Serie B
n_teams: 20

phases:
  - id: league
    type: round_robin
    # Head-to-head ("confronto direto"), only used when exactly 2 clubs are
    # tied (Art. 12 par. 1): goal difference of the two legs combined ("jogo
    # de 180 minutos") -- points aren't used here, unlike Serie A.
    head_to_head_mode: goal_diff_only
    spots:
      - name: title
        positions: {from: 1, to: 1}
      - name: direct_promotion
        positions: {from: 1, to: 2} # promoted to Serie A outright
      - name: rebaixamento
        positions: {from: 17, to: 20} # relegated to Serie C (Art. 5)

  # Access playoffs ("cruzamento olimpico", Art. 13): 3rd vs 6th, 4th vs 5th
  # (regular-season positions). First leg at the worse-seeded team's home,
  # second (deciding) leg at the better-seeded team's home (par. 2). Decided
  # by points earned across both legs (3/1/0 each, par. 3), then aggregate
  # goal difference, then regular-season position as the final tiebreak
  # (par. 4) -- not a random draw, the better-seeded team advances.
  - id: acesso
    type: playoff
    source_phase: league
    pairing: table_position
    pairs: [[3, 6], [4, 5]]
    legs: 2
    leg_order: worse_seed_home_first
    tiebreak: points_then_goal_diff
    spots:
      - name: playoff_promotion
        result: winner

aggregates:
  - name: promotion
    of: [direct_promotion, playoff_promotion]
