# Brasileirao Serie B 2025.
#
# Source: REC (Regulamento Especifico da Competicao) for the 2025 season.
# Differs from 2026's REC in one respect relevant here: the access playoff
# ("cruzamento olimpico", Art. 13 in the 2026 REC) didn't exist yet -- all 4
# promotion spots were awarded directly by table position, no playoff phase.
#
# Known simplifications:
# - Tiebreak steps 5-6 (fewer red/yellow cards, Art. 12) are skipped -- we
#   have no disciplinary data -- so a tied pair falls straight through to a
#   random draw, the statistically correct stand-in for the official
#   last-resort "sorteio".
name: Serie B
n_teams: 20

phases:
  - id: league
    type: round_robin
    # Head-to-head ("confronto direto"), only used when exactly 2 clubs are
    # tied (Art. 12 par. 1): goal difference of the two legs combined ("jogo
    # de 180 minutos") -- points aren't used here, unlike Serie A.
    head_to_head_mode: goal_diff_only
    spots:
      - name: title
        positions: { from: 1, to: 1 }
      - name: direct_promotion
        positions: { from: 1, to: 4 } # promoted to Serie A outright -- no access playoff this season
      - name: rebaixamento
        positions: { from: 17, to: 20 } # relegated to Serie C (Art. 5)
