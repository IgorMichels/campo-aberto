<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Aberto - Confrontos</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%BD</text></svg>"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/matches.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Campo Aberto</h1>
      <p class="subtitle">Probabilidades de placar por confronto</p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="index.html">Classificação</a>
      <a href="evolution.html">Evolução</a>
      <a href="matches.html" aria-current="page">Confrontos</a>
    </nav>

    <main>
      <div class="controls">
        <div class="tabs" id="competition-tabs" role="tablist" aria-label="Competição"></div>

        <div class="season-picker">
          <label for="season-select">Temporada</label>
          <select id="season-select"></select>
        </div>
      </div>

      <p class="model-note" id="model-note"></p>

      <div class="round-bar">
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input
            class="team-filter"
            id="team-filter"
            type="text"
            placeholder="Buscar time..."
            autocomplete="off"
          />
        </div>
      </div>

      <div class="stickers-carousel">
        <button class="scroll-btn left" id="scroll-left" aria-label="Rolar para a esquerda">
          &#10094;
        </button>
        <div class="stickers-grid" id="stickers-grid"></div>
        <button class="scroll-btn right" id="scroll-right" aria-label="Rolar para a direita">
          &#10095;
        </button>
      </div>

      <p class="status-message" id="status-message" hidden></p>

      <section class="confronto-builder">
        <h2 class="builder-title">Monte seu confronto</h2>
        <p class="builder-subtitle">
          Escolha a competição e o time de cada lado -- qualquer combinação, inclusive entre
          divisões diferentes.
        </p>

        <div class="builder-grid">
          <div class="builder-side" data-side="home">
            <label for="builder-home-competition">Competição (casa)</label>
            <select class="competition-select" id="builder-home-competition"></select>

            <label for="builder-home-team">Time da casa</label>
            <select class="team-select" id="builder-home-team"></select>

            <div class="crest-preview" id="builder-home-crest"></div>
          </div>

          <div class="builder-vs" aria-hidden="true">&times;</div>

          <div class="builder-side" data-side="away">
            <label for="builder-away-competition">Competição (visitante)</label>
            <select class="competition-select" id="builder-away-competition"></select>

            <label for="builder-away-team">Time visitante</label>
            <select class="team-select" id="builder-away-team"></select>

            <div class="crest-preview" id="builder-away-crest"></div>
          </div>
        </div>

        <div class="builder-result" id="builder-result"></div>
      </section>
    </main>

    <div class="sticker-modal" id="sticker-modal">
      <div class="sticker-modal-overlay" id="sticker-modal-overlay"></div>
      <div class="sticker-modal-content" id="sticker-modal-content"></div>
    </div>

    <footer class="page-footer">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"
          >campo-aberto</a
        >.
      </p>
    </footer>

    <script src="assets/js/dixon_coles.js"></script>
    <script src="assets/js/matches.js"></script>
  </body>
</html>
