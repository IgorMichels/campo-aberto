<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Aberto - Jogos passados</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%BD</text></svg>"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/matches.css" />
    <script>
      // Applies any stored theme choice before first paint, so the page
      // never flashes the wrong palette. theme.js (loaded later) owns the
      // toggle button itself.
      (() => {
        const stored = localStorage.getItem("campo-aberto-theme");
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      })();
    </script>
  </head>
  <body>
    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Mudar para tema escuro"
    ></button>

    <header class="page-header">
      <h1>Campo Aberto</h1>
      <p class="subtitle">Probabilidades dos jogos passados, geradas antes do confronto</p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="../index.html">Início</a>
      <a href="../probabilities.html">Classificação</a>
      <a href="../evolution.html">Evolução</a>
      <div class="nav-dropdown">
        <a
          href="upcoming.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          aria-current="page"
          >Jogos</a
        >
        <div class="nav-dropdown-menu">
          <a href="upcoming.html">Próximos</a>
          <a href="played.html" aria-current="page">Passados</a>
          <a href="simulate.html">Simule</a>
        </div>
      </div>
    </nav>

    <main>
      <div class="controls">
        <div class="tabs" id="competition-tabs" role="tablist" aria-label="Competição"></div>

        <div class="season-picker">
          <label for="season-select">Temporada</label>
          <select id="season-select"></select>
        </div>
      </div>

      <div class="round-bar">
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input
            class="team-filter"
            id="team-filter"
            type="text"
            placeholder="Buscar time..."
            autocomplete="off"
          />
        </div>
      </div>

      <div class="matches-grid" id="stickers-grid"></div>

      <div class="load-more-wrap">
        <button type="button" class="load-more-btn" id="load-more" hidden>Mostrar mais</button>
      </div>

      <p class="status-message" id="status-message" hidden></p>
    </main>

    <div class="sticker-modal" id="sticker-modal">
      <div class="sticker-modal-overlay" id="sticker-modal-overlay"></div>
      <div class="sticker-modal-inner">
        <div class="sticker-modal-content" id="sticker-modal-content"></div>
        <div class="sticker-modal-toolbar">
          <button
            type="button"
            class="modal-btn modal-btn-download"
            id="sticker-modal-download"
            aria-label="Baixar figurinha"
            title="Baixar figurinha"
          >
            &#11015; Baixar
          </button>
          <button
            type="button"
            class="modal-btn modal-btn-share"
            id="sticker-modal-share"
            aria-label="Compartilhar figurinha"
            title="Compartilhar figurinha"
          >
            &#128279; Compartilhar
          </button>
        </div>
        <button
          type="button"
          class="modal-btn-close-circle"
          id="sticker-modal-close"
          aria-label="Fechar"
          title="Fechar"
        >
          &#10005;
        </button>
      </div>
    </div>

    <footer class="page-footer">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"
          >campo-aberto</a
        >.
      </p>
    </footer>

    <script src="../assets/js/score_models.js"></script>
    <script src="../assets/js/poisson_home.js"></script>
    <script src="../assets/js/nav.js"></script>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/team_display.js"></script>
    <script src="../assets/js/matches_shared.js"></script>
    <script src="../assets/js/matches_played.js"></script>
  </body>
</html>
