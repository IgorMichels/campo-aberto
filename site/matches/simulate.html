<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Aberto - Simule um jogo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%BD</text></svg>"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/matches.css" />
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  </head>
  <body>
    <header class="page-header">
      <h1>Campo Aberto</h1>
      <p class="subtitle">
        Use as setas para escolher os dois times e veja a probabilidade de cada placar
      </p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="../index.html">Classificação</a>
      <a href="../evolution.html">Evolução</a>
      <div class="nav-dropdown">
        <a
          href="upcoming.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          aria-current="page"
          >Jogos</a
        >
        <div class="nav-dropdown-menu">
          <a href="upcoming.html">Próximos</a>
          <a href="played.html">Passados</a>
          <a href="simulate.html" aria-current="page">Simule</a>
        </div>
      </div>
    </nav>

    <main>
      <p class="status-message" id="status-message" hidden></p>

      <section class="confronto-builder">
        <h2 class="builder-title">Monte seu confronto!</h2>

        <div class="builder-grid">
          <div class="builder-side" data-side="home">
            <div class="competition-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-competition-prev"
                aria-label="Competição anterior"
              >
                &#9664;
              </button>

              <div class="competition-carousel-name" id="builder-home-competition-name"></div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-competition-next"
                aria-label="Próxima competição"
              >
                &#9654;
              </button>
            </div>

            <div class="team-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-prev"
                aria-label="Time anterior"
              >
                &#9664;
              </button>

              <div class="team-carousel-card">
                <div class="crest-preview" id="builder-home-crest"></div>
                <div class="team-select">
                  <button
                    type="button"
                    class="team-select-trigger"
                    id="builder-home-name"
                    aria-haspopup="true"
                    aria-expanded="false"
                  ></button>
                  <div class="team-select-menu" id="builder-home-team-menu"></div>
                </div>
              </div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-next"
                aria-label="Próximo time"
              >
                &#9654;
              </button>
            </div>
          </div>

          <div class="builder-side" data-side="away">
            <div class="competition-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-competition-prev"
                aria-label="Competição anterior"
              >
                &#9664;
              </button>

              <div class="competition-carousel-name" id="builder-away-competition-name"></div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-competition-next"
                aria-label="Próxima competição"
              >
                &#9654;
              </button>
            </div>

            <div class="team-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-prev"
                aria-label="Time anterior"
              >
                &#9664;
              </button>

              <div class="team-carousel-card">
                <div class="crest-preview" id="builder-away-crest"></div>
                <div class="team-select">
                  <button
                    type="button"
                    class="team-select-trigger"
                    id="builder-away-name"
                    aria-haspopup="true"
                    aria-expanded="false"
                  ></button>
                  <div class="team-select-menu" id="builder-away-team-menu"></div>
                </div>
              </div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-next"
                aria-label="Próximo time"
              >
                &#9654;
              </button>
            </div>
          </div>
        </div>

        <div class="builder-result" id="builder-result"></div>
      </section>
    </main>

    <div class="sticker-modal" id="sticker-modal">
      <div class="sticker-modal-overlay" id="sticker-modal-overlay"></div>
      <div class="sticker-modal-inner">
        <div class="sticker-modal-content" id="sticker-modal-content"></div>
        <div class="sticker-modal-toolbar">
          <button
            type="button"
            class="modal-btn modal-btn-download"
            id="sticker-modal-download"
            aria-label="Baixar figurinha"
            title="Baixar figurinha"
          >
            &#11015; Baixar
          </button>
          <button
            type="button"
            class="modal-btn modal-btn-share"
            id="sticker-modal-share"
            aria-label="Compartilhar figurinha"
            title="Compartilhar figurinha"
          >
            &#128279; Compartilhar
          </button>
        </div>
        <button
          type="button"
          class="modal-btn-close-circle"
          id="sticker-modal-close"
          aria-label="Fechar"
          title="Fechar"
        >
          &#10005;
        </button>
      </div>
    </div>

    <footer class="page-footer">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"
          >campo-aberto</a
        >.
      </p>
    </footer>

    <script src="../assets/js/dixon_coles.js"></script>
    <script src="../assets/js/nav.js"></script>
    <script src="../assets/js/team_display.js"></script>
    <script src="../assets/js/matches_shared.js"></script>
    <script src="../assets/js/matches_simulate.js"></script>
  </body>
</html>
