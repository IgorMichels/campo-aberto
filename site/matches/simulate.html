<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Aberto - Simule um jogo</title>
    <meta
      name="description"
      content="Simulador de confrontos: escolha dois times de qualquer temporada e veja a probabilidade de cada placar."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Campo Aberto - Simule um jogo" />
    <meta
      property="og:description"
      content="Simulador de confrontos: escolha dois times de qualquer temporada e veja a probabilidade de cada placar."
    />
    <meta
      property="og:image"
      content="https://igormichels.github.io/campo-aberto/assets/marca/og-image-1200x630.jpg"
    />
    <meta
      property="og:url"
      content="https://igormichels.github.io/campo-aberto/matches/simulate.html"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="../assets/marca/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="../assets/marca/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="../assets/marca/favicon-180.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/matches.css" />
    <script>
      // Applies any stored theme choice before first paint, so the page
      // never flashes the wrong palette. theme.js (loaded later) owns the
      // toggle button itself.
      (() => {
        const stored = localStorage.getItem("campo-aberto-theme");
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      })();
    </script>
  </head>
  <body>
    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Mudar para tema escuro"
    ></button>

    <header class="page-header">
      <h1>
        <svg class="brand-mark" viewBox="0 0 100 76" aria-hidden="true">
          <g
            fill="none"
            stroke="currentColor"
            stroke-width="6.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M50 6 H9.2 V70 H50" />
            <path d="M50 6 V70" />
            <circle cx="50.0" cy="38.0" r="13.0" />
          </g>
          <g fill="none" stroke="var(--accent)" stroke-width="6.4" stroke-linecap="round">
            <path d="M68.5 38.0 L90.5 38.0" opacity="1.0" />
            <path d="M67.3 31.4 L87.8 23.5" opacity="0.66" />
            <path d="M67.3 44.6 L87.8 52.5" opacity="0.66" />
            <path d="M63.7 25.6 L80.1 10.9" opacity="0.36" />
            <path d="M63.7 50.4 L80.1 65.1" opacity="0.36" />
          </g></svg
        >Campo Aberto
      </h1>
      <p class="subtitle">
        Use as setas para escolher os dois times e veja a probabilidade de cada placar desse
        confronto
      </p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="../index.html">Início</a>
      <a href="../probabilities.html">Classificação</a>
      <a href="../evolution.html">Evolução</a>
      <div class="nav-dropdown">
        <a
          href="upcoming.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          aria-current="page"
          >Jogos</a
        >
        <div class="nav-dropdown-menu">
          <a href="upcoming.html">Próximos</a>
          <a href="played.html">Passados</a>
          <a href="simulate.html" aria-current="page">Simule</a>
        </div>
      </div>
      <div class="nav-dropdown">
        <a
          href="../model/docs.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          >Modelo</a
        >
        <div class="nav-dropdown-menu">
          <a href="../model/docs.html">Documentação</a>
          <a href="../model/stats.html">Estatísticas</a>
        </div>
      </div>
    </nav>

    <main>
      <p class="status-message" id="status-message" hidden></p>

      <section class="confronto-builder">
        <h2 class="builder-title">Monte seu confronto!</h2>

        <div class="builder-grid">
          <div class="builder-side" data-side="home">
            <div class="competition-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-competition-prev"
                aria-label="Competição anterior"
              >
                &#9664;
              </button>

              <div class="competition-carousel-name" id="builder-home-competition-name"></div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-competition-next"
                aria-label="Próxima competição"
              >
                &#9654;
              </button>
            </div>

            <div class="team-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-prev"
                aria-label="Time anterior"
              >
                &#9664;
              </button>

              <div class="team-carousel-card">
                <div class="crest-preview" id="builder-home-crest"></div>
                <div class="team-select">
                  <button
                    type="button"
                    class="team-select-trigger"
                    id="builder-home-name"
                    aria-haspopup="true"
                    aria-expanded="false"
                  ></button>
                  <div class="team-select-menu" id="builder-home-team-menu"></div>
                </div>
              </div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-home-next"
                aria-label="Próximo time"
              >
                &#9654;
              </button>
            </div>
          </div>

          <div class="builder-side" data-side="away">
            <div class="competition-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-competition-prev"
                aria-label="Competição anterior"
              >
                &#9664;
              </button>

              <div class="competition-carousel-name" id="builder-away-competition-name"></div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-competition-next"
                aria-label="Próxima competição"
              >
                &#9654;
              </button>
            </div>

            <div class="team-carousel">
              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-prev"
                aria-label="Time anterior"
              >
                &#9664;
              </button>

              <div class="team-carousel-card">
                <div class="crest-preview" id="builder-away-crest"></div>
                <div class="team-select">
                  <button
                    type="button"
                    class="team-select-trigger"
                    id="builder-away-name"
                    aria-haspopup="true"
                    aria-expanded="false"
                  ></button>
                  <div class="team-select-menu" id="builder-away-team-menu"></div>
                </div>
              </div>

              <button
                type="button"
                class="carousel-arrow"
                id="builder-away-next"
                aria-label="Próximo time"
              >
                &#9654;
              </button>
            </div>
          </div>
        </div>

        <div class="builder-result" id="builder-result"></div>
      </section>
    </main>

    <div class="sticker-modal" id="sticker-modal">
      <div class="sticker-modal-overlay" id="sticker-modal-overlay"></div>
      <div class="sticker-modal-inner">
        <div class="sticker-modal-content" id="sticker-modal-content"></div>
        <div class="sticker-modal-toolbar">
          <button
            type="button"
            class="modal-btn modal-btn-download"
            id="sticker-modal-download"
            aria-label="Baixar figurinha"
            title="Baixar figurinha"
          >
            &#11015; Baixar
          </button>
          <button
            type="button"
            class="modal-btn modal-btn-share"
            id="sticker-modal-share"
            aria-label="Compartilhar figurinha"
            title="Compartilhar figurinha"
          >
            &#128279; Compartilhar
          </button>
        </div>
        <button
          type="button"
          class="modal-btn-close-circle"
          id="sticker-modal-close"
          aria-label="Fechar"
          title="Fechar"
        >
          &#10005;
        </button>
      </div>
    </div>

    <footer class="page-footer corner-arc">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"
          >campo-aberto</a
        >.
      </p>
      <p class="last-updated" id="last-updated"></p>
    </footer>

    <script src="../assets/js/score_models.js"></script>
    <script src="../assets/js/poisson_home.js"></script>
    <script src="../assets/js/nav.js"></script>
    <script src="../assets/js/theme.js"></script>
    <!-- Placeholder analytics hook -- inert until a provider is picked, see assets/js/analytics.js -->
    <script src="../assets/js/analytics.js"></script>
    <script src="../assets/js/last_updated.js"></script>
    <script src="../assets/js/team_display.js"></script>
    <script src="../assets/js/matches_shared.js"></script>
    <script src="../assets/js/matches_simulate.js"></script>
  </body>
</html>
