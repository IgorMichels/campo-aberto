    <meta property="og:title" content="Campo Aberto - Próximos jogos" />
    <meta
      property="og:description"
      content="Probabilidades de placar para os próximos jogos da Série A e da Série B do Campeonato Brasileiro."
    />
    <meta
      property="og:image"
      content="https://igormichels.github.io/campo-aberto/assets/marca/og-image-1200x630.jpg"

    <meta

    />

    <link rel="icon" href="../assets/marca/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="../assets/marca/favicon-180.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/matches.css" />
    <script>
      // Applies any stored theme choice before first paint, so the page
      // never flashes the wrong palette. theme.js (loaded later) owns the
      // toggle button itself.
      (() => {
        const stored = localStorage.getItem("campo-aberto-theme");
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      })();
    </script>
  </head>
  <body>
    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Mudar para tema escuro"
    ></button>

    <header class="page-header">
      <h1>
        <svg class="brand-mark" viewBox="0 0 100 76" aria-hidden="true">
          <g
            fill="none"
            stroke="currentColor"
            stroke-width="6.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M50 6 H9.2 V70 H50" />
            <path d="M50 6 V70" />
            <circle cx="50.0" cy="38.0" r="13.0" />
          </g>
          <g fill="none" stroke="var(--accent)" stroke-width="6.4" stroke-linecap="round">
            <path d="M68.5 38.0 L90.5 38.0" opacity="1.0" />
            <path d="M67.3 31.4 L87.8 23.5" opacity="0.66" />
            <path d="M67.3 44.6 L87.8 52.5" opacity="0.66" />
            <path d="M63.7 25.6 L80.1 10.9" opacity="0.36" />
            <path d="M63.7 50.4 L80.1 65.1" opacity="0.36" />
          </g></svg
        >Campo Aberto
      </h1>
      <p class="subtitle">Probabilidades dos próximos jogos</p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="../index.html">Início</a>
      <a href="../probabilities.html">Classificação</a>
      <a href="../evolution.html">Evolução</a>
      <div class="nav-dropdown">
        <a
          href="upcoming.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          aria-current="page"
          >Jogos</a
        >
        <div class="nav-dropdown-menu">
          <a href="upcoming.html" aria-current="page">Próximos</a>
          <a href="played.html">Passados</a>
          <a href="simulate.html">Simule</a>
        </div>
      </div>
      <div class="nav-dropdown">
        <a
          href="../model/docs.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          >Modelo</a
        >
        <div class="nav-dropdown-menu">
          <a href="../model/docs.html">Documentação</a>
          <a href="../model/stats.html">Estatísticas</a>
        </div>
      </div>
    </nav>

    <main>
      <div class="controls">
        <div class="tabs" id="competition-tabs" role="tablist" aria-label="Competição"></div>

        <div class="season-picker">
          <label for="season-select">Temporada</label>
          <select id="season-select"></select>
        </div>
      </div>

      <p class="model-note" id="model-note"></p>

      <div class="round-bar">
        <div class="search-wrap">
          <span class="search-icon">&#128269;</span>
          <input
            class="team-filter"
            id="team-filter"
            type="text"
            placeholder="Buscar time..."
            autocomplete="off"
          />
        </div>
      </div>

      <div class="matches-grid" id="stickers-grid"></div>

      <div class="load-more-wrap">
        <button type="button" class="load-more-btn" id="load-more" hidden>Mostrar mais</button>
      </div>

      <p class="status-message" id="status-message" hidden></p>
    </main>

    <div class="sticker-modal" id="sticker-modal">
      <div class="sticker-modal-overlay" id="sticker-modal-overlay"></div>
      <div class="sticker-modal-inner">
        <div class="sticker-modal-content" id="sticker-modal-content"></div>
        <div class="sticker-modal-toolbar">
          <button
            type="button"
            class="modal-btn modal-btn-download"
            id="sticker-modal-download"
            aria-label="Baixar figurinha"
            title="Baixar figurinha"
          >
            &#11015; Baixar
          </button>
          <button
            type="button"
            class="modal-btn modal-btn-share"
            id="sticker-modal-share"
            aria-label="Compartilhar figurinha"
            title="Compartilhar figurinha"
          >
            &#128279; Compartilhar
          </button>
        </div>
        <button
          type="button"
          class="modal-btn-close-circle"
          id="sticker-modal-close"
          aria-label="Fechar"
          title="Fechar"
        >
          &#10005;
        </button>
      </div>
    </div>

    <footer class="page-footer corner-arc">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"

      <p class="last-updated" id="last-updated"></p>
    </footer>

    <script src="../assets/js/score_models.js"></script>

    <!-- Placeholder analytics hook -- inert until a provider is picked, see assets/js/analytics.js -->
    <script src="../assets/js/analytics.js"></script>
    <script src="../assets/js/last_updated.js"></script>
    <script src="../assets/js/team_display.js"></script>
    <script src="../assets/js/matches_shared.js"></script>
    <script src="../assets/js/matches_upcoming.js"></script>
  </body>
</html>
