<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Aberto</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9A%BD</text></svg>"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Campo Aberto</h1>
      <p class="subtitle">Probabilidades simuladas para o Brasileirão</p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="index.html" aria-current="page">Classificação</a>
      <a href="evolution.html">Evolução</a>
      <a href="matches.html">Confrontos</a>
    </nav>

    <main>
      <div class="controls">
        <div class="tabs" id="competition-tabs" role="tablist" aria-label="Competição"></div>

        <div class="season-picker">
          <label for="season-select">Temporada</label>
          <select id="season-select"></select>
        </div>

        <div class="date-picker">
          <label for="date-select">Data de referência</label>
          <select id="date-select"></select>
        </div>
      </div>

      <div class="table-scroll">
        <table id="results-table">
          <thead>
            <tr id="table-head-row"></tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td class="status-cell">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <p class="status-message" id="status-message" hidden></p>
    </main>

    <footer class="page-footer">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"
          >campo-aberto</a
        >.
      </p>
    </footer>

    <script src="assets/js/app.js"></script>
  </body>
</html>
