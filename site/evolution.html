<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campo Aberto - Evolução</title>
    <meta
      name="description"
      content="Evolução das probabilidades de título, acesso, torneios continentais e rebaixamento ao longo da temporada, rodada a rodada."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Campo Aberto - Evolução" />
    <meta
      property="og:description"
      content="Evolução das probabilidades de título, acesso, torneios continentais e rebaixamento ao longo da temporada, rodada a rodada."
    />
    <meta
      property="og:image"
      content="https://igormichels.github.io/campo-aberto/assets/marca/og-image-1200x630.jpg"
    />
    <meta property="og:url" content="https://igormichels.github.io/campo-aberto/evolution.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="assets/marca/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/marca/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="assets/marca/favicon-180.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <script>
      // Applies any stored theme choice before first paint, so the page
      // never flashes the wrong palette. theme.js (loaded later) owns the
      // toggle button itself.
      (() => {
        const stored = localStorage.getItem("campo-aberto-theme");
        if (stored === "light" || stored === "dark") {
          document.documentElement.setAttribute("data-theme", stored);
        }
      })();
    </script>
  </head>
  <body>
    <button
      id="theme-toggle"
      class="theme-toggle"
      type="button"
      aria-pressed="false"
      aria-label="Mudar para tema escuro"
    ></button>

    <header class="page-header">
      <h1>
        <svg class="brand-mark" viewBox="0 0 100 76" aria-hidden="true">
          <g
            fill="none"
            stroke="currentColor"
            stroke-width="6.4"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M50 6 H9.2 V70 H50" />
            <path d="M50 6 V70" />
            <circle cx="50.0" cy="38.0" r="13.0" />
          </g>
          <g fill="none" stroke="var(--accent)" stroke-width="6.4" stroke-linecap="round">
            <path d="M68.5 38.0 L90.5 38.0" opacity="1.0" />
            <path d="M67.3 31.4 L87.8 23.5" opacity="0.66" />
            <path d="M67.3 44.6 L87.8 52.5" opacity="0.66" />
            <path d="M63.7 25.6 L80.1 10.9" opacity="0.36" />
            <path d="M63.7 50.4 L80.1 65.1" opacity="0.36" />
          </g></svg
        >Campo Aberto
      </h1>
      <p class="subtitle">Evolução das probabilidades ao longo do tempo</p>
    </header>

    <nav class="page-nav" aria-label="Páginas">
      <a href="index.html">Início</a>
      <a href="probabilities.html">Classificação</a>
      <a href="evolution.html" aria-current="page">Evolução</a>
      <div class="nav-dropdown">
        <a
          href="matches/upcoming.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          >Jogos</a
        >
        <div class="nav-dropdown-menu">
          <a href="matches/upcoming.html">Próximos</a>
          <a href="matches/played.html">Passados</a>
          <a href="matches/simulate.html">Simule</a>
        </div>
      </div>
      <div class="nav-dropdown">
        <a
          href="model/docs.html"
          class="nav-dropdown-trigger"
          aria-haspopup="true"
          aria-expanded="false"
          >Modelo</a
        >
        <div class="nav-dropdown-menu">
          <a href="model/docs.html">Documentação</a>
          <a href="model/stats.html">Estatísticas</a>
        </div>
      </div>
    </nav>

    <main>
      <div class="controls">
        <div class="tabs" id="competition-tabs" role="tablist" aria-label="Competição"></div>

        <div class="season-picker">
          <label for="season-select">Temporada</label>
          <select id="season-select"></select>
        </div>

        <div class="season-picker">
          <label for="spot-select">Probabilidade</label>
          <select id="spot-select"></select>
        </div>

        <div class="team-picker" id="team-picker">
          <button
            type="button"
            id="team-picker-toggle"
            class="team-picker-toggle"
            aria-haspopup="listbox"
            aria-expanded="false"
          >
            Times <span id="team-picker-count">(0/6)</span>
          </button>
          <div id="team-picker-panel" class="team-picker-panel" hidden></div>
        </div>
      </div>

      <div class="chart-toolbar">
        <button type="button" id="table-toggle" class="table-toggle-button" aria-pressed="false">
          Ver como tabela
        </button>
      </div>

      <div class="chart-card">
        <div id="evolution-chart"></div>
        <div class="table-scroll" id="evolution-table-wrap" hidden>
          <table id="evolution-table">
            <thead>
              <tr id="evolution-table-head"></tr>
            </thead>
            <tbody id="evolution-table-body"></tbody>
          </table>
        </div>
      </div>

      <p class="status-message" id="status-message" hidden></p>
    </main>

    <footer class="page-footer corner-arc">
      <p>
        Gerado a partir de simulações do
        <a href="https://github.com/IgorMichels/campo-aberto" target="_blank" rel="noopener"
          >campo-aberto</a
        >.
      </p>
      <p class="last-updated" id="last-updated"></p>
    </footer>

    <script src="assets/js/nav.js"></script>
    <script src="assets/js/theme.js"></script>
    <!-- Placeholder analytics hook -- inert until a provider is picked, see assets/js/analytics.js -->
    <script src="assets/js/analytics.js"></script>
    <script src="assets/js/last_updated.js"></script>
    <script src="assets/js/team_display.js"></script>
    <script src="assets/js/evolution.js"></script>
  </body>
</html>
