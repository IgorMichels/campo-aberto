repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: ["html", "css", "javascript", "json", "markdown", "yaml"]
        exclude: ^uv\.lock$

  - repo: local
    hooks:
      - id: pytest-related
        name: pytest (related tests)
        entry: uv run python scripts/run_related_tests.py
        language: system
        pass_filenames: true
        files: ^(src|tests)/.*\.py$
